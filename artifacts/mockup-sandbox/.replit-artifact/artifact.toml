kind = "design"
previewPath = "/"
title = "Atelier Web"
version = "1.0.0"
id = "XegfDyZt7HqfW2Bb8Ghoy"

[[services]]
localPort = 8081
name = "Atelier Web"
paths = ["/"]

[services.env]
PORT = "8081"
BASE_PATH = "/"
API_PROXY_TARGET = "http://127.0.0.1:8080"

[services.development]
run = "pnpm --filter @workspace/mockup-sandbox run dev"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/mockup-sandbox", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/mockup-sandbox", "run", "preview"]

[services.production.run.env]
PORT = "8081"
BASE_PATH = "/"
API_PROXY_TARGET = "http://127.0.0.1:8080"
NODE_ENV = "production"
