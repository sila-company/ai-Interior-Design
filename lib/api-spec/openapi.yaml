openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Interior Design App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Room design projects
  - name: userProfiles
    description: User style profiles
  - name: furnitureItems
    description: Furniture catalog
  - name: cartItems
    description: Shopping cart
  - name: orders
    description: Checkout orders
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new room project from uploaded photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /user-profiles:
    post:
      operationId: saveUserProfile
      tags: [userProfiles]
      summary: Save user style quiz answers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "201":
          description: Profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /furniture-items:
    get:
      operationId: listFurnitureItems
      tags: [furnitureItems]
      summary: Get furniture recommendations
      parameters:
        - in: query
          name: projectId
          schema:
            type: string
          required: false
      responses:
        "200":
          description: List of furniture items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FurnitureItem"

  /cart-items:
    get:
      operationId: listCartItems
      tags: [cartItems]
      summary: Get all cart items
      responses:
        "200":
          description: Cart items list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartItem"
    post:
      operationId: addCartItem
      tags: [cartItems]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCartItemInput"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"

  /cart-items/{id}:
    delete:
      operationId: removeCartItem
      tags: [cartItems]
      summary: Remove item from cart
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Item removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Checkout all cart items
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CreateProjectInput:
      type: object
      properties:
        photoUri:
          type: string
        roomType:
          type: string
      required:
        - photoUri
        - roomType

    Project:
      type: object
      properties:
        id:
          type: string
        photoUri:
          type: string
        roomType:
          type: string
        aiRoomImageUrl:
          type: string
        createdAt:
          type: string
      required:
        - id
        - photoUri
        - roomType
        - aiRoomImageUrl
        - createdAt

    UserProfileInput:
      type: object
      properties:
        stylePreference:
          type: string
        colorPalette:
          type: string
        budget:
          type: number
        projectId:
          type: string
      required:
        - stylePreference
        - colorPalette
        - budget
        - projectId

    UserProfile:
      type: object
      properties:
        id:
          type: string
        stylePreference:
          type: string
        colorPalette:
          type: string
        budget:
          type: number
        projectId:
          type: string
        createdAt:
          type: string
      required:
        - id
        - stylePreference
        - colorPalette
        - budget
        - projectId
        - createdAt

    FurnitureItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        brand:
          type: string
        price:
          type: number
        imageUrl:
          type: string
        category:
          type: string
        description:
          type: string
        inStock:
          type: boolean
      required:
        - id
        - name
        - brand
        - price
        - imageUrl
        - category
        - description
        - inStock

    AddCartItemInput:
      type: object
      properties:
        furnitureItemId:
          type: string
        quantity:
          type: number
      required:
        - furnitureItemId
        - quantity

    CartItem:
      type: object
      properties:
        id:
          type: string
        furnitureItemId:
          type: string
        quantity:
          type: number
        furnitureItem:
          $ref: "#/components/schemas/FurnitureItem"
      required:
        - id
        - furnitureItemId
        - quantity
        - furnitureItem

    Order:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        totalAmount:
          type: number
        itemCount:
          type: number
        createdAt:
          type: string
      required:
        - id
        - status
        - totalAmount
        - itemCount
        - createdAt

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
