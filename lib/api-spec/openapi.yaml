openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Atelier shared API for iOS, web, and Android clients
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: styles
    description: Interior design styles
  - name: redesigns
    description: AI room redesign generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /styles:
    get:
      operationId: listDesignStyles
      tags: [styles]
      summary: List available interior design styles
      responses:
        "200":
          description: Design styles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DesignStyle"

  /redesigns:
    post:
      operationId: createRedesign
      tags: [redesigns]
      summary: Generate an AI room redesign from a photo and style
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                styleId:
                  type: string
              required:
                - image
                - styleId
      responses:
        "201":
          description: Redesign generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedesignResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream AI provider error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DesignStyle:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
      required:
        - id
        - name
        - description
        - icon

    RedesignResult:
      type: object
      properties:
        styleId:
          type: string
        mimeType:
          type: string
        imageBase64:
          type: string
      required:
        - styleId
        - mimeType
        - imageBase64

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
